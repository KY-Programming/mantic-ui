<div class="chat" #chat>
    @for (message of messages(); track message) {
        <m-chat-message [message]="message" />
    }
    <ng-content />
</div>
@if (canSend()) {
    <div class="input-wrapper" [class.visible]="canSend()">
        <m-input autofocus [(value)]="message" [placeholder]="placeholder()" (keydown)="onKeyDown($event)">
            @if (showSendIcon()) {
                <m-button class="icon" (click)="sendMessage()">
                    @if (!sendIconTemplate()) {
                        <m-icon [icon]="sendIcon() ?? defaults.sendIcon()" [size]="sendIconSize() ?? defaults.sendIconSize()" />
                    } @else {
                        <ng-template [ngTemplateOutlet]="sendIconTemplate()" />
                    }
                </m-button>
            }
        </m-input>
    </div>
}
