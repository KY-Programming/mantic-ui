<m-menu position="top" fixed>
    @if (showHamburger()) {
        <m-menu-item>
            <m-icon [icon]="menuIcon() ?? defaults.menuIcon()" [size]="menuIconSize() ?? defaults.menuIconSize()" />
        </m-menu-item>
    }
    @for (template of layoutService.menuTemplates; track template) {
        <ng-container [ngTemplateOutlet]="template" />
    }
</m-menu>
<ng-content />
<m-footer>
    @for (template of layoutService.footerTemplates; track template) {
        <ng-container [ngTemplateOutlet]="template" />
    }
</m-footer>
