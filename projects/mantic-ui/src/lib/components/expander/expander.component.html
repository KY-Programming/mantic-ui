<m-flex class="title" [reverse]="iconPosition() !== 'left'" [class.active]="expanded()" (click)="toggle()">
    <m-icon [icon]="dropdownIcon() ?? defaults.dropdownIcon()" [size]="dropdownIconSize() ?? defaults.dropdownIconSize()" iconClass="dropdown icon" />
    <m-fill>
        @if (headerTemplate(); as headerComponent) {
            <ng-container [ngTemplateOutlet]="headerComponent.template()" />
        } @else {
            {{ header() }}
        }
    </m-fill>
</m-flex>
<div class="content" [class.active]="expanded()">
    <ng-content />
</div>
