@if (animated()) {
    <div class="visible content">
        <ng-container [ngTemplateOutlet]="content" />
    </div>
    <ng-content select="m-animation" />
}
@if (label()) {
    @if (labelPosition() === 'left') {
        <ng-container [ngTemplateOutlet]="labelTemplate" />
    }
    <div class="ui" [class.basic]="basic()" [class.icon]="icon()" [ngClass]="color()" [class.button]="true">
        <ng-container [ngTemplateOutlet]="content" />
    </div>
    @if (labelPosition() !== 'left') {
        <ng-container [ngTemplateOutlet]="labelTemplate" />
    }
    <ng-template #labelTemplate>
        <ng-content select="m-label" />
    </ng-template>
}
@if (social()) {
    <m-icon [icon]="social()!.toLowerCase()" class="icon" />
    {{ social() }}
}
@if (!animated() && !label() && !social()) {
    <ng-container [ngTemplateOutlet]="content" />
}
<ng-template #content>
    @if (icon()) {
        <m-icon [icon]="icon()" [size]="iconSize()" />
    }
    <ng-content />
</ng-template>
